version: '3.9'

services:
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=vrp
      - POSTGRES_USER=${DB_USER:?DB_USER must be set in .env}
      - POSTGRES_PASSWORD=${DB_PASS:?DB_PASS must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d vrp"]
      interval: 5s
      timeout: 5s
      retries: 5

  vrp:
    build: .
    ports:
      - "${VRP_PORT:-8080}:80"
    env_file:
      - .env
    environment:
      - PORT=3001
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=vrp
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./exports:/exports
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:

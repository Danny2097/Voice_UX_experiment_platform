server {
    listen 80 default_server;
    server_name _;

    # Enable gzip compression
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 1000;

    # Logging to stdout/stderr for Docker
    access_log /dev/stdout;
    error_log /dev/stderr;

    # Serve static files from /usr/share/nginx/html
    root /usr/share/nginx/html;
    index index.html;

    # Allow large audio uploads (up to 500 MB)
    client_max_body_size 500M;

    # Suppress favicon 404 noise
    location = /favicon.ico {
        log_not_found off;
        access_log off;
        return 204;
    }

    # Static files with long cache (CSS, JS)
    location ~ \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML files with shorter cache
    location ~ \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Other static assets
    location ~ \.(json|woff|woff2|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Audio upload/download (long timeout, no buffering) ───────
    location /api/audio/ {
        proxy_pass             http://localhost:3002/api/audio/;
        proxy_http_version     1.1;
        proxy_set_header       Host            $host;
        proxy_set_header       X-Real-IP       $remote_addr;
        proxy_read_timeout     300s;
        proxy_send_timeout     300s;
        proxy_request_buffering off;
        proxy_buffering         off;
    }

    # ── Database API (internal port 3002) ────────────────────────
    location /api {
        proxy_pass         http://localhost:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        proxy_buffering    off;
    }

    # ── CORS proxy for external museum APIs (internal port 3001) ─
    location /proxy {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # HTML5 history mode: fallback to index.html for non-matching routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
